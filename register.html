<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Speak With Clarity</title>
    <meta name="description" content="Moderator & Speaker registration for Speak With Clarity" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body class="min-h-screen bg-white text-gray-900 antialiased dark:bg-gray-950 dark:text-gray-100">
    <header class="sticky top-0 z-40 bg-white/5 backdrop-blur-sm">
      <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 lg:px-8">
        <a href="index.html" class="flex items-center gap-3">
          <img src="img/swc.jpg" alt="Speak With Clarity Logo" class="h-10 w-auto" />
          <div class="hidden sm:block">
            <span class="text-lg font-bold">Speak With Clarity</span>
            <span class="ml-2 rounded-full bg-accent-500/20 px-2 py-0.5 text-xs font-medium text-accent-300">University of Lagos</span>
          </div>
        </a>
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-sm font-medium text-primary-600 hover:underline">Home</a>
        </div>
      </nav>
    </header>

    <main class="py-20">
      <div class="mx-auto max-w-4xl px-4">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-bold">Moderator & Speaker Registration</h1>
          <p class="mt-2 text-gray-600">This registration page is reserved for event moderators and speakers. If you're an attendee, please contact the organizers.</p>
        </div>

        <div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-sm">
          <form id="moderator-registration" class="space-y-6" action="#" method="post">
            <div class="grid gap-6 sm:grid-cols-2">
              <div>
                <label for="first-name" class="block text-sm font-medium text-gray-700">First Name *</label>
                <input type="text" id="first-name" name="first_name" required class="mt-2 w-full rounded-lg border px-4 py-3" placeholder="First name" />
              </div>
              <div>
                <label for="last-name" class="block text-sm font-medium text-gray-700">Last Name *</label>
                <input type="text" id="last-name" name="last_name" required class="mt-2 w-full rounded-lg border px-4 py-3" placeholder="Last name" />
              </div>
            </div>

            <div>
              <label for="email" class="block text-sm font-medium text-gray-700">Email *</label>
              <input type="email" id="email" name="email" required class="mt-2 w-full rounded-lg border px-4 py-3" placeholder="you@institution.edu" />
            </div>

            <div>
              <label for="phone" class="block text-sm font-medium text-gray-700">Phone</label>
              <input type="tel" id="phone" name="phone" class="mt-2 w-full rounded-lg border px-4 py-3" placeholder="+234 ..." />
            </div>

            <div>
              <label for="role" class="block text-sm font-medium text-gray-700">Role *</label>
              <select id="role" name="role" required class="mt-2 w-full rounded-lg border px-4 py-3">
                <option value="" disabled selected>Select role</option>
                <option value="moderator">Moderator</option>
                <option value="speaker">Speaker</option>
              </select>
            </div>

            <div>
              <label for="bio" class="block text-sm font-medium text-gray-700">Short Bio / Topic (optional)</label>
              <textarea id="bio" name="bio" rows="4" class="mt-2 w-full rounded-lg border px-4 py-3" placeholder="Brief bio or the topic you'll present"></textarea>
            </div>

            <button type="submit" class="w-full rounded-lg bg-primary-600 px-6 py-3 text-white font-semibold">Submit Registration</button>
            <p class="text-xs text-gray-500 text-center mt-2">By submitting you agree to be contacted about event logistics.</p>
          </form>
        </div>
      </div>
    </main>

    <script>
      // Minimal client-side hint: ensure role is moderator or speaker
      document.getElementById('moderator-registration').addEventListener('submit', function(e) {
        var role = document.getElementById('role').value;
        if (!role) {
          e.preventDefault();
          alert('Please select your role (Moderator or Speaker).');
        }
      });
    </script>
  </body>
</html>
